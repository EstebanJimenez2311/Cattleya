<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leamos las Raíces - CATTLEYA</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="data/charts.js"></script>
  <script src="components/index.js"></script>
  <style>
    .preview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 40px;
    }

    @media (max-width: 900px) {
      .preview-grid,
      .analysis-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }
  </style>
</head>
<body>

  <cat-navbar active="analisis"></cat-navbar>

  <cat-page-hero
    letter="A"
    position="Segunda"
    title="Leamos las Raíces"
    subtitle="Leer las raíces es mirar lo que sostiene la historia: estadística descriptiva, distribuciones y patrones en los datos sobre violencia contra la mujer en Colombia.">
  </cat-page-hero>

  <div class="section--bg" style="margin-top:0;">
    <div class="section__inner">
      <cat-section-header
        label="Las raíces en cifras"
        subtitle="Reemplaza estos valores con los resultados reales del análisis en Python.">
      </cat-section-header>
      <cat-surface variant="cream" padding="24px" radius="24px">
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;">
        <cat-stat-card variant="dark" number="XX,XXX" label="Total de registros analizados"></cat-stat-card>
        <cat-stat-card variant="dark" number="XX" label="Variables en el dataset"></cat-stat-card>
        <cat-stat-card variant="dark" number="X.X%" label="Valores nulos / faltantes"></cat-stat-card>
        <cat-stat-card variant="dark" number="20XX-20XX" label="Rango temporal del dataset"></cat-stat-card>
      </div>
      </cat-surface>
    </div>
  </div>

  <section class="section">
    <div class="preview-grid">
      <div>
        <cat-section-header
          label="Leamos las raíces"
          title="Lo que sostiene la historia,&lt;br&gt;&lt;em&gt;aparece en los datos&lt;/em&gt;"
          subtitle="Aquí observamos la base del problema: aplicamos análisis exploratorio y estadística descriptiva para identificar patrones, concentraciones y señales tempranas en los reportes de violencia contra la mujer.">
        </cat-section-header>
        <a href="#graficos-eda" class="btn-primary" style="margin-top:32px;display:inline-flex;">Leer las raíces &rarr;</a>
      </div>
      <cat-chart
        chart-id="chart-home"
        title="Distribución por tipo de violencia">
      </cat-chart>
    </div>
  </section>

  <div class="section" id="graficos-eda">
    <cat-section-header
      label="Raíces del problema"
      title="¿Qué revelan las raíces?"
      subtitle="Cada gráfico ayuda a leer la estructura del problema e identificar dónde se concentran sus patrones.">
    </cat-section-header>

    <div class="analysis-grid">
      <cat-chart
        chart-id="chart-evolucion"
        title="Evolución anual de casos reportados"
        description="¿Aumentaron o disminuyeron los casos a lo largo del tiempo?">
      </cat-chart>
      <cat-chart
        chart-id="chart-departamentos"
        title="Distribución por departamento (Top 10)"
        description="¿Cuáles son las regiones más afectadas?">
      </cat-chart>
    </div>

    <div class="analysis-grid" style="margin-top:24px;">
      <cat-chart
        chart-id="chart-edad"
        title="Distribución por grupo de edad"
        description="¿Qué grupos etarios son más vulnerables?">
      </cat-chart>
      <cat-chart
        chart-id="chart-tipo"
        title="Tipo de violencia más frecuente"
        description="¿Qué tipos de violencia predominan en los reportes?">
      </cat-chart>
    </div>

    <div style="margin-top:24px;">
      <cat-chart
        chart-id="chart-meses"
        title="Estacionalidad - casos por mes (promedio histórico)"
        description="¿Hay meses con mayor incidencia?"
        height="260">
      </cat-chart>
    </div>
  </div>

  <div class="section--bg">
    <div class="section__inner">
      <cat-section-header
        label="Hallazgos"
        title="Lo que revelan las raíces">
      </cat-section-header>
      <cat-surface padding="24px" radius="24px">
      <div class="cards-grid" style="margin-top:0;">
        <cat-card
          icon="[1]"
          title="Hallazgo 1 - [Raíz identificada]"
          text="Describe aquí el patrón más revelador de la lectura descriptiva. Reemplaza este texto con el resultado real del notebook.">
        </cat-card>
        <cat-card
          icon="[2]"
          title="Hallazgo 2 - [Territorio o patrón]"
          text="Segundo hallazgo importante. Por ejemplo: concentración geográfica, grupo etario más afectado o tipo de violencia predominante.">
        </cat-card>
        <cat-card
          icon="[3]"
          title="Hallazgo 3 - [Señal clave]"
          text="Tercer hallazgo. Considera tendencias temporales, variaciones regionales o correlaciones iniciales que ayuden a entender la raíz del problema.">
        </cat-card>
      </div>
      </cat-surface>
    </div>
  </div>

  <div class="section" style="padding-top:0;">
    <cat-cta-banner
      title="¿Necesitas ayuda ahora?"
      text="Si tú o alguien que conoces está en riesgo, no estás sola. Hay personas dispuestas a escucharte y a ayudarte."
      btn-text="Ver líneas de ayuda &rarr;"
      btn-href="lucha.html">
    </cat-cta-banner>
  </div>

  <div style="max-width:1200px;margin:0 auto;padding:40px;display:flex;justify-content:space-between;">
    <a href="contexto.html" class="btn-outline" style="border-color:var(--magenta);color:var(--magenta);">&larr; Contexto</a>
    <a href="tendencias.html" class="btn-primary">Tendencias &rarr;</a>
  </div>

  <cat-chatbot-btn></cat-chatbot-btn>
  <cat-footer></cat-footer>
  <script src="js/config.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
